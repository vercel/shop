allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  esbuild: false
  sharp: false

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@next/*"
  - "@shopify/hydrogen"
  - "@tailwindcss/*"
  - "@types/react"
  - "@vercel/*"
  - ai
  - next
  - react
  - react-dom
  - tailwindcss

packages:
  - "apps/*"
